<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BTC Predictor — Live Dashboard</title>
<style>
  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --border:  #30363d;
    --accent:  #f7931a;
    --green:   #3fb950;
    --red:     #f85149;
    --text:    #e6edf3;
    --muted:   #8b949e;
    --up-bg:   rgba(63,185,80,.12);
    --dn-bg:   rgba(248,81,73,.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex; align-items: center; gap: 14px;
  }
  header .logo { font-size: 28px; }
  header h1 { font-size: 1.2rem; font-weight: 600; }
  header h1 span { color: var(--accent); }
  .status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--muted); margin-left: auto;
    transition: background .3s;
  }
  .status-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-label { font-size: .8rem; color: var(--muted); }

  /* ── Layout ── */
  main { display: grid; grid-template-columns: 1fr 380px; gap: 20px; padding: 20px 24px; }
  @media (max-width: 900px) { main { grid-template-columns: 1fr; } }

  section h2 {
    font-size: .85rem; font-weight: 600; letter-spacing: .06em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 12px;
  }

  /* ── Predictions table ── */
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%; border-collapse: collapse;
    font-size: .82rem;
  }
  th {
    background: var(--surface); color: var(--muted);
    font-weight: 600; font-size: .75rem; letter-spacing: .05em;
    text-transform: uppercase;
    padding: 10px 12px; text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tr:hover td { background: rgba(255,255,255,.03); }

  .badge {
    display: inline-block;
    padding: 2px 8px; border-radius: 20px;
    font-size: .75rem; font-weight: 700; letter-spacing: .04em;
  }
  .badge.up { background: var(--up-bg); color: var(--green); }
  .badge.dn { background: var(--dn-bg); color: var(--red); }

  /* ── Log panel ── */
  #log-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    height: 520px;
    overflow-y: auto;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    font-size: .78rem;
    line-height: 1.7;
    color: #c9d1d9;
    display: flex; flex-direction: column;
  }
  #log-panel p { margin: 0; }
  #log-panel p.info   { color: #8b949e; }
  #log-panel p.fetch  { color: #79c0ff; }
  #log-panel p.model  { color: #d2a8ff; }
  #log-panel p.done   { color: var(--green); }
  #log-panel p.error  { color: var(--red); }
  #log-panel p.sleep  { color: #8b949e; font-style: italic; }

  /* ── Last prediction cards ── */
  .cards { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .card .model-name { font-size: .8rem; color: var(--muted); margin-bottom: 4px; }
  .card .price { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
  .card.up { border-left: 3px solid var(--green); }
  .card.dn { border-left: 3px solid var(--red); }

  .empty-state {
    color: var(--muted); font-size: .85rem;
    text-align: center; padding: 40px 0;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">₿</div>
  <h1>BTC <span>15-min</span> Predictor</h1>
  <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
    <div class="status-dot" id="dot"></div>
    <span class="status-label" id="status-label">Connecting…</span>
  </div>
</header>

<main>
  <!-- Left: latest cards + table -->
  <div>
    <section style="margin-bottom:24px;">
      <h2>Latest Prediction</h2>
      <div class="cards" id="cards">
        <div class="empty-state">Waiting for first prediction…</div>
      </div>
    </section>

    <section>
      <h2>History</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Generated</th>
              <th>Interval</th>
              <th>Last $</th>
              <th>TF LSTM</th>
              <th></th>
              <th>PyTorch</th>
              <th></th>
              <th>ARIMAX</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="9" class="empty-state">No predictions yet.</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <!-- Right: live log -->
  <div>
    <section>
      <h2>Live Log</h2>
      <div id="log-panel"></div>
    </section>
  </div>
</main>

<script>
  const dot         = document.getElementById('dot');
  const statusLabel = document.getElementById('status-label');
  const logPanel    = document.getElementById('log-panel');
  const tbody       = document.getElementById('tbody');
  const cards       = document.getElementById('cards');

  let allPredictions = [];

  // ── SSE ──────────────────────────────────────────────────────────────────────
  function connect() {
    const es = new EventSource('/stream');

    es.onopen = () => {
      dot.classList.add('live');
      statusLabel.textContent = 'Live';
    };

    es.onmessage = (e) => {
      const payload = JSON.parse(e.data);

      if (payload.msg) {
        appendLog(payload.msg);
      }

      if (payload.new_prediction) {
        const row = payload.new_prediction;
        // Avoid duplicates (seed sends last 5)
        if (!allPredictions.find(p => p.generated_at === row.generated_at)) {
          allPredictions.unshift(row);
          if (allPredictions.length > 200) allPredictions.pop();
          renderCards(row);
          renderTable();
        }
      }
    };

    es.onerror = () => {
      dot.classList.remove('live');
      statusLabel.textContent = 'Reconnecting…';
      es.close();
      setTimeout(connect, 3000);
    };
  }

  // ── Log renderer ─────────────────────────────────────────────────────────────
  function appendLog(msg) {
    const p  = document.createElement('p');
    p.textContent = msg;
    if      (msg.includes('ERROR'))    p.className = 'error';
    else if (msg.includes('Sleeping')) p.className = 'sleep';
    else if (msg.includes('Fetching') || msg.includes('candles')) p.className = 'fetch';
    else if (msg.includes('LSTM') || msg.includes('ARIMAX'))      p.className = 'model';
    else if (msg.includes('Done'))     p.className = 'done';
    else                               p.className = 'info';
    logPanel.appendChild(p);
    logPanel.scrollTop = logPanel.scrollHeight;
    // Keep last 300 lines
    while (logPanel.children.length > 300) logPanel.removeChild(logPanel.firstChild);
  }

  // ── Cards ─────────────────────────────────────────────────────────────────────
  function renderCards(row) {
    const models = [
      { name: 'TF LSTM',      price: row.tf_price, dir: row.tf_dir },
      { name: 'PyTorch LSTM', price: row.pt_price, dir: row.pt_dir },
      { name: 'ARIMAX',       price: row.ar_price, dir: row.ar_dir },
    ];
    cards.innerHTML = models.map(m => `
      <div class="card ${m.dir === 'UP' ? 'up' : 'dn'}">
        <div>
          <div class="model-name">${m.name}</div>
          <div class="price">$${m.price.toLocaleString('en-US', {minimumFractionDigits:2})}</div>
          <div style="font-size:.75rem;color:var(--muted);margin-top:4px;">${row.interval_start} → ${row.interval_end}</div>
        </div>
        <span class="badge ${m.dir === 'UP' ? 'up' : 'dn'}">${m.dir === 'UP' ? '▲ UP' : '▼ DOWN'}</span>
      </div>
    `).join('');
  }

  // ── Table ────────────────────────────────────────────────────────────────────
  function badge(dir) {
    return `<span class="badge ${dir==='UP'?'up':'dn'}">${dir==='UP'?'▲':'▼'} ${dir}</span>`;
  }
  function renderTable() {
    if (!allPredictions.length) return;
    tbody.innerHTML = allPredictions.map(r => `
      <tr>
        <td>${r.generated_at}</td>
        <td>${r.interval_start.replace(/\s*ET/,'')}</td>
        <td>$${r.last_close.toLocaleString('en-US',{minimumFractionDigits:2})}</td>
        <td>$${r.tf_price.toLocaleString('en-US',{minimumFractionDigits:2})}</td>
        <td>${badge(r.tf_dir)}</td>
        <td>$${r.pt_price.toLocaleString('en-US',{minimumFractionDigits:2})}</td>
        <td>${badge(r.pt_dir)}</td>
        <td>$${r.ar_price.toLocaleString('en-US',{minimumFractionDigits:2})}</td>
        <td>${badge(r.ar_dir)}</td>
      </tr>
    `).join('');
  }

  // ── Boot ─────────────────────────────────────────────────────────────────────
  // Load existing predictions first, then open SSE
  fetch('/api/predictions')
    .then(r => r.json())
    .then(data => {
      allPredictions = data;
      if (data.length) { renderCards(data[0]); renderTable(); }
      connect();
    })
    .catch(() => connect());
</script>
</body>
</html>
